<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registro de comidas</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.x/dist/tabler-icons.min.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f0;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      padding: 2rem 1.5rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.07);
    }

    .header {
      text-align: center;
      margin-bottom: 1.75rem;
    }

    .logo {
      width: 48px;
      height: 48px;
      background: #EAF3DE;
      border-radius: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      margin-bottom: 12px;
    }

    .title {
      font-size: 20px;
      font-weight: 600;
      color: #1a1a1a;
    }

    .subtitle {
      font-size: 14px;
      color: #888;
      margin-top: 4px;
    }

    .field-label {
      font-size: 12px;
      font-weight: 500;
      color: #888;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .name-input {
      width: 100%;
      font-size: 15px;
      padding: 11px 14px;
      border-radius: 10px;
      border: 1.5px solid #e5e5e5;
      background: #fafaf8;
      color: #1a1a1a;
      font-family: inherit;
      margin-bottom: 1.25rem;
      transition: border-color 0.15s;
    }

    .name-input:focus {
      outline: none;
      border-color: #639922;
    }

    .meal-card {
      background: #fafaf8;
      border: 1.5px solid #ebebeb;
      border-radius: 14px;
      padding: 1rem 1.25rem;
      margin-bottom: 12px;
    }

    .meal-title {
      font-size: 15px;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .meal-title i { font-size: 17px; color: #888; }

    .toggle-row {
      display: flex;
      gap: 8px;
    }

    .toggle-btn {
      flex: 1;
      padding: 10px 0;
      border-radius: 10px;
      border: 1.5px solid #e5e5e5;
      background: #fff;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      color: #666;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: all 0.15s;
      font-family: inherit;
    }

    .toggle-btn:active { transform: scale(0.97); }
    .toggle-btn i { font-size: 15px; }

    .toggle-btn.active-casa {
      background: #EAF3DE;
      border-color: #639922;
      color: #3B6D11;
    }

    .toggle-btn.active-tarjeta {
      background: #E6F1FB;
      border-color: #378ADD;
      color: #185FA5;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 99px;
      margin-top: 10px;
      font-weight: 500;
    }

    .pill-casa { background: #EAF3DE; color: #3B6D11; }
    .pill-tarjeta { background: #E6F1FB; color: #185FA5; }

    .divider {
      border: none;
      border-top: 1.5px solid #ebebeb;
      margin: 1.25rem 0;
    }

    .send-btn {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: #25D366;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-family: inherit;
      transition: opacity 0.15s, transform 0.1s;
    }

    .send-btn:hover { opacity: 0.92; }
    .send-btn:active { transform: scale(0.98); }
    .send-btn i { font-size: 20px; }

    .status-bar {
      font-size: 13px;
      color: #E24B4A;
      text-align: center;
      margin-top: 10px;
      min-height: 20px;
    }

    .footer {
      text-align: center;
      font-size: 12px;
      color: #bbb;
      margin-top: 1.5rem;
    }
  </style>
</head>
<body>

<div class="card">

  <div class="header">
    <div class="logo">🍱</div>
    <div class="title" id="display-name">Registro de comidas</div>
    <div class="subtitle" id="display-date"></div>
  </div>

  <div class="field-label">Tu nombre</div>
  <input
    class="name-input"
    type="text"
    id="driver-name"
    placeholder="Ej: Juan García"
    oninput="updateName(this.value)"
    autocomplete="name"
  />

  <div class="meal-card">
    <div class="meal-title">
      <i class="ti ti-sun"></i> Comida
    </div>
    <div class="toggle-row">
      <button class="toggle-btn" id="lunch-casa" onclick="setMeal('lunch','casa')">
        <i class="ti ti-home"></i> De casa
      </button>
      <button class="toggle-btn" id="lunch-tarjeta" onclick="setMeal('lunch','tarjeta')">
        <i class="ti ti-credit-card"></i> Tarjeta
      </button>
    </div>
    <div id="lunch-pill"></div>
  </div>

  <div class="meal-card">
    <div class="meal-title">
      <i class="ti ti-moon"></i> Cena
    </div>
    <div class="toggle-row">
      <button class="toggle-btn" id="dinner-casa" onclick="setMeal('dinner','casa')">
        <i class="ti ti-home"></i> De casa
      </button>
      <button class="toggle-btn" id="dinner-tarjeta" onclick="setMeal('dinner','tarjeta')">
        <i class="ti ti-credit-card"></i> Tarjeta
      </button>
    </div>
    <div id="dinner-pill"></div>
  </div>

  <hr class="divider" />

  <button class="send-btn" onclick="sendWhatsApp()">
    <i class="ti ti-brand-whatsapp"></i>
    Enviar reporte
  </button>
  <div class="status-bar" id="status"></div>

  <div class="footer">Pulsa los botones y envía el reporte cada día</div>

</div>

<script>
  const state = { lunch: null, dinner: null };

  function formatDate() {
    const d = new Date();
    const days = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
    const months = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
    return days[d.getDay()] + ', ' + d.getDate() + ' de ' + months[d.getMonth()];
  }

  document.getElementById('display-date').textContent = formatDate();

  function updateName(val) {
    document.getElementById('display-name').textContent = val.trim() || 'Registro de comidas';
  }

  function setMeal(meal, val) {
    state[meal] = val;
    const casa = document.getElementById(meal + '-casa');
    const tarjeta = document.getElementById(meal + '-tarjeta');
    const pill = document.getElementById(meal + '-pill');

    casa.className = 'toggle-btn' + (val === 'casa' ? ' active-casa' : '');
    tarjeta.className = 'toggle-btn' + (val === 'tarjeta' ? ' active-tarjeta' : '');

    if (val === 'casa') {
      pill.innerHTML = '<span class="pill pill-casa"><i class="ti ti-home"></i> Lleva comida de casa</span>';
    } else {
      pill.innerHTML = '<span class="pill pill-tarjeta"><i class="ti ti-credit-card"></i> Paga con tarjeta empresa</span>';
    }

    document.getElementById('status').textContent = '';
  }

  function buildMessage() {
    const name = document.getElementById('driver-name').value.trim() || 'Chofer';
    const date = formatDate();
    const lunchTxt = state.lunch === 'casa' ? '🏠 De casa' : '💳 Tarjeta empresa';
    const dinnerTxt = state.dinner === 'casa' ? '🏠 De casa' : '💳 Tarjeta empresa';
    return '🍱 Reporte de comidas\n👤 ' + name + '\n📅 ' + date + '\n\n🌞 Comida: ' + lunchTxt + '\n🌙 Cena: ' + dinnerTxt;
  }

  function sendWhatsApp() {
    if (!state.lunch || !state.dinner) {
      document.getElementById('status').textContent = 'Selecciona comida y cena antes de enviar.';
      return;
    }
    const msg = buildMessage();
    window.open('https://wa.me/34658971042?text=' + encodeURIComponent(msg), '_blank');
  }
</script>

</body>
</html>
