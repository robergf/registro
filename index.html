<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registro de comidas</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.x/dist/tabler-icons.min.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f0;
      min-height: 100vh;
      padding: 1.5rem 1rem 3rem;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      padding: 1.5rem 1.25rem;
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      box-shadow: 0 2px 16px rgba(0,0,0,0.07);
    }

    .header {
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .logo { font-size: 28px; margin-bottom: 8px; }

    .title {
      font-size: 19px;
      font-weight: 600;
      color: #1a1a1a;
    }

    .month-label {
      font-size: 13px;
      color: #888;
      margin-top: 3px;
      text-transform: capitalize;
    }

    .field-label {
      font-size: 12px;
      font-weight: 500;
      color: #888;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .name-input {
      width: 100%;
      font-size: 15px;
      padding: 11px 14px;
      border-radius: 10px;
      border: 1.5px solid #e5e5e5;
      background: #fafaf8;
      color: #1a1a1a;
      font-family: inherit;
      margin-bottom: 1.25rem;
      transition: border-color 0.15s;
    }

    .name-input:focus { outline: none; border-color: #639922; }

    .legend {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      color: #666;
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 3px;
    }

    .dot-none { background: #ebebeb; }
    .dot-casa { background: #639922; }
    .dot-tarjeta { background: #378ADD; }

    .col-headers {
      display: grid;
      grid-template-columns: 64px 1fr 1fr 1fr;
      gap: 4px;
      padding: 0 2px;
      margin-bottom: 6px;
    }

    .col-header {
      text-align: center;
      font-size: 11px;
      font-weight: 600;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 3px;
    }

    .days-list { display: flex; flex-direction: column; gap: 4px; }

    .day-row {
      display: grid;
      grid-template-columns: 64px 1fr 1fr 1fr;
      gap: 4px;
      align-items: center;
    }

    .day-label {
      font-size: 13px;
      font-weight: 500;
      color: #444;
      padding: 0 4px;
      line-height: 1.3;
    }

    .day-label .wd {
      font-size: 11px;
      color: #bbb;
      font-weight: 400;
      display: block;
    }

    .day-row.weekend .day-label { color: #bbb; }
    .day-row.weekend .wd { color: #ddd; }

    .meal-btn {
      padding: 9px 2px;
      border-radius: 8px;
      border: 1.5px solid #ebebeb;
      background: #fafaf8;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      color: #ccc;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 3px;
      transition: all 0.12s;
      font-family: inherit;
    }

    .meal-btn:active { transform: scale(0.95); }
    .meal-btn i { font-size: 13px; }

    .meal-btn.casa {
      background: #EAF3DE;
      border-color: #639922;
      color: #3B6D11;
    }

    .meal-btn.tarjeta {
      background: #E6F1FB;
      border-color: #378ADD;
      color: #185FA5;
    }

    .divider {
      border: none;
      border-top: 1.5px solid #ebebeb;
      margin: 1.25rem 0;
    }

    .summary {
      background: #fafaf8;
      border-radius: 12px;
      border: 1.5px solid #ebebeb;
      padding: 1rem 1.25rem;
      margin-bottom: 1rem;
      font-size: 13px;
      color: #555;
      line-height: 1.9;
      display: none;
    }

    .summary.visible { display: block; }
    .summary strong { color: #1a1a1a; font-weight: 600; }

    .send-btn {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: #25D366;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-family: inherit;
      transition: opacity 0.15s, transform 0.1s;
    }

    .send-btn:hover { opacity: 0.92; }
    .send-btn:active { transform: scale(0.98); }
    .send-btn i { font-size: 20px; }

    .status-bar {
      font-size: 13px;
      color: #E24B4A;
      text-align: center;
      margin-top: 10px;
      min-height: 20px;
    }

    .clear-btn {
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: 1.5px solid #ebebeb;
      background: transparent;
      color: #aaa;
      font-size: 13px;
      cursor: pointer;
      font-family: inherit;
      margin-top: 8px;
      transition: all 0.15s;
    }

    .clear-btn:hover { color: #E24B4A; border-color: #E24B4A; }

    .hint {
      text-align: center;
      font-size: 12px;
      color: #bbb;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="header">
    <div class="logo">🍱</div>
    <div class="title">Registro de Dietas</div>
    <div class="month-label" id="display-name" style="font-size:15px; font-weight:600; color:#444; margin-top:2px;">J12 Miguel</div>
    <div class="month-label" id="display-month"></div>
  </div>

  <input type="hidden" id="driver-name" value="J12 Miguel" />

  <div class="legend">
    <div class="legend-item"><div class="legend-dot dot-none"></div> Sin marcar</div>
    <div class="legend-item"><div class="legend-dot dot-casa"></div> De casa</div>
    <div class="legend-item"><div class="legend-dot dot-tarjeta"></div> Tarjeta</div>
  </div>

  <p class="hint">Toca cada botón para cambiar: sin marcar → casa → tarjeta</p>

  <div class="col-headers">
    <div class="col-header"></div>
    <div class="col-header"><i class="ti ti-coffee"></i> Desay.</div>
    <div class="col-header"><i class="ti ti-sun"></i> Comida</div>
    <div class="col-header"><i class="ti ti-moon"></i> Cena</div>
  </div>

  <div class="days-list" id="days-list"></div>

  <hr class="divider" />

  <div class="summary" id="summary"></div>

  <button class="send-btn" onclick="sendWhatsApp()">
    <i class="ti ti-brand-whatsapp"></i>
    Enviar reporte
  </button>
  <div class="status-bar" id="status"></div>
  <button class="clear-btn" onclick="clearAll()">Borrar todo</button>
</div>

<script>
  const DAYS_ES = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  const MONTHS_ES = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  const MEALS = ['breakfast','lunch','dinner'];
  const MEAL_LABEL = { breakfast: 'Desayuno', lunch: 'Comida', dinner: 'Cena' };
  const MEAL_EMOJI = { breakfast: '☕', lunch: '🌞', dinner: '🌙' };

  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth();
  const daysInMonth = new Date(year, month + 1, 0).getDate();

  document.getElementById('display-month').textContent = MONTHS_ES[month] + ' ' + year;

  const state = {};
  for (let d = 1; d <= daysInMonth; d++) {
    state[d] = { breakfast: null, lunch: null, dinner: null };
  }

  function buildRows() {
    const list = document.getElementById('days-list');
    for (let d = 1; d <= daysInMonth; d++) {
      const wd = new Date(year, month, d).getDay();
      const isWeekend = wd === 0 || wd === 6;

      const row = document.createElement('div');
      row.className = 'day-row' + (isWeekend ? ' weekend' : '');

      const label = document.createElement('div');
      label.className = 'day-label';
      label.innerHTML = d + '<span class="wd">' + DAYS_ES[wd] + '</span>';
      row.appendChild(label);

      MEALS.forEach(meal => {
        const btn = document.createElement('button');
        btn.id = 'btn-' + d + '-' + meal;
        btn.className = 'meal-btn';
        btn.innerHTML = '—';
        btn.onclick = () => cycle(d, meal);
        row.appendChild(btn);
      });

      list.appendChild(row);
    }
  }

  function cycle(day, meal) {
    const cur = state[day][meal];
    state[day][meal] = cur === null ? 'casa' : cur === 'casa' ? 'tarjeta' : null;
    renderBtn(day, meal);
    updateSummary();
    document.getElementById('status').textContent = '';
  }

  function renderBtn(day, meal) {
    const val = state[day][meal];
    const btn = document.getElementById('btn-' + day + '-' + meal);
    if (val === 'casa') {
      btn.className = 'meal-btn casa';
      btn.innerHTML = '<i class="ti ti-home"></i> Casa';
    } else if (val === 'tarjeta') {
      btn.className = 'meal-btn tarjeta';
      btn.innerHTML = '<i class="ti ti-credit-card"></i> Tarj.';
    } else {
      btn.className = 'meal-btn';
      btn.innerHTML = '—';
    }
  }

  function updateSummary() {
    const casa = { breakfast: [], lunch: [], dinner: [] };
    const tarjeta = { breakfast: [], lunch: [], dinner: [] };

    for (let d = 1; d <= daysInMonth; d++) {
      MEALS.forEach(meal => {
        if (state[d][meal] === 'casa') casa[meal].push(d);
        else if (state[d][meal] === 'tarjeta') tarjeta[meal].push(d);
      });
    }

    const hasAny = MEALS.some(m => casa[m].length || tarjeta[m].length);
    const el = document.getElementById('summary');
    if (!hasAny) { el.classList.remove('visible'); return; }

    let html = '';
    MEALS.forEach(meal => {
      if (casa[meal].length || tarjeta[meal].length) {
        html += '<strong>' + MEAL_EMOJI[meal] + ' ' + MEAL_LABEL[meal] + '</strong><br>';
        if (casa[meal].length) html += '🏠 Casa: días ' + casa[meal].join(', ') + '<br>';
        if (tarjeta[meal].length) html += '💳 Tarjeta: días ' + tarjeta[meal].join(', ') + '<br>';
        html += '<br>';
      }
    });

    el.innerHTML = html;
    el.classList.add('visible');
  }

  function buildMessage() {
    const name = document.getElementById('driver-name').value.trim() || 'Chofer';
    const monthStr = MONTHS_ES[month] + ' ' + year;
    let msg = '🍱 Reporte de comidas\n👤 ' + name + '\n📅 ' + monthStr + '\n\n';
    let hasAny = false;

    MEALS.forEach(meal => {
      const casaDays = [], tarjetaDays = [];
      for (let d = 1; d <= daysInMonth; d++) {
        if (state[d][meal] === 'casa') casaDays.push(d);
        else if (state[d][meal] === 'tarjeta') tarjetaDays.push(d);
      }
      if (casaDays.length || tarjetaDays.length) {
        hasAny = true;
        msg += MEAL_EMOJI[meal] + ' ' + MEAL_LABEL[meal] + ':\n';
        if (casaDays.length) msg += '  🏠 Casa → días ' + casaDays.join(', ') + '\n';
        if (tarjetaDays.length) msg += '  💳 Tarjeta → días ' + tarjetaDays.join(', ') + '\n';
        msg += '\n';
      }
    });

    return hasAny ? msg.trim() : null;
  }

  function sendWhatsApp() {
    const msg = buildMessage();
    if (!msg) {
      document.getElementById('status').textContent = 'Marca al menos un día antes de enviar.';
      return;
    }
    window.open('https://wa.me/34658971042?text=' + encodeURIComponent(msg), '_blank');
  }

  function clearAll() {
    for (let d = 1; d <= daysInMonth; d++) {
      MEALS.forEach(meal => { state[d][meal] = null; renderBtn(d, meal); });
    }
    document.getElementById('summary').classList.remove('visible');
    document.getElementById('status').textContent = '';
  }

  buildRows();
</script>

</body>
</html>
